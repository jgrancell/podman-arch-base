name: Build Container Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Resolve image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: podman build -f Containerfile -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push SHA tag
        run: podman push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Push latest tag
        if: github.ref == 'refs/heads/main'
        run: |
          podman tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          podman push ${{ env.IMAGE }}:latest

      - name: Push version tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          podman tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:${{ github.ref_name }}
          podman push ${{ env.IMAGE }}:${{ github.ref_name }}
